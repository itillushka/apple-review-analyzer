# Frontend container nginx: serve the SPA and proxy /api/* to the backend service.
server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # SPA client-side routing.
    location / {
        try_files $uri /index.html;
    }

    # Proxy API calls to the backend container (compose service name "api").
    # The trailing slash strips the /api prefix: /api/analyze -> api:8100/analyze
    location /api/ {
        proxy_pass http://api:8100/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
