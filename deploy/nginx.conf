# HOST nginx site for Review Atlas — public subdomain obrio.teriffic.xyz.
#
# Lives alongside other sites on this box (e.g. classbliss) without touching them.
# Reverse-proxies the public subdomain to the localhost-bound web container
# (docker compose publishes it on 127.0.0.1:8180).
#
# Install:
#   sudo cp deploy/nginx.conf /etc/nginx/sites-available/obrio
#   sudo ln -sf /etc/nginx/sites-available/obrio /etc/nginx/sites-enabled/obrio
#   sudo nginx -t && sudo systemctl reload nginx
#   sudo certbot --nginx -d obrio.teriffic.xyz   # injects the 443 block + HTTP->HTTPS redirect
#
# Requires obrio.teriffic.xyz to resolve directly to this server (Cloudflare record
# set to "DNS only") so the Let's Encrypt HTTP-01 challenge reaches this nginx.

server {
    listen 80;
    server_name obrio.teriffic.xyz;

    location / {
        proxy_pass http://127.0.0.1:8180;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
