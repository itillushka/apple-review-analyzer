# HOST nginx (on the VPS) — TLS termination + reverse proxy to the web container.
# certbot manages the certificate. Replace review-atlas.example.com with the real host.

server {
    listen 80;
    server_name review-atlas.example.com;
    # certbot will add the ACME challenge + redirect to HTTPS here.
    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl;
    server_name review-atlas.example.com;

    # Managed by certbot:
    ssl_certificate     /etc/letsencrypt/live/review-atlas.example.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/review-atlas.example.com/privkey.pem;

    # Proxy everything to the dockerized web container (frontend + /api).
    location / {
        proxy_pass http://127.0.0.1:8080;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
