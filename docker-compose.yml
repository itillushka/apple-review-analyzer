# Review Atlas — full stack.
#
# `api`  : FastAPI backend (works today).            -> internal :8100
# `web`  : Vite/React frontend + nginx (proxies /api -> api).  -> host 127.0.0.1:8180
#
# Run the backend only:   docker compose up -d api
# Run everything:         docker compose up -d
# The web container binds to localhost only (127.0.0.1:8180); the host's nginx +
# certbot terminates TLS and reverse-proxies the public subdomain to it. Port 8180
# avoids the other stack already on this box (8000 / 3000). See deploy/nginx.conf
# and DEPLOY.md.

services:
  api:
    build: ./backend
    env_file: ./backend/.env
    volumes:
      - api-data:/app/data
    expose:
      - "8100"
    restart: unless-stopped

  web:
    build: ./frontend
    depends_on:
      - api
    ports:
      - "127.0.0.1:8180:80"
    restart: unless-stopped

volumes:
  api-data:
