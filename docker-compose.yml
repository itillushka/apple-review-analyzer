# Review Atlas — full stack.
#
# `api`  : FastAPI backend (works today).            -> internal :8100
# `web`  : Vite/React frontend + nginx (proxies /api -> api). Builds once the
#          frontend project exists in ./frontend.    -> host :8080
#
# Run the backend only:   docker compose up -d api
# Run everything:         docker compose up -d
# The host's nginx + certbot terminates TLS and proxies to the web container
# (see deploy/nginx.conf and DEPLOY.md).

services:
  api:
    build: ./backend
    env_file: ./backend/.env
    volumes:
      - api-data:/app/data
    expose:
      - "8100"
    restart: unless-stopped

  web:
    build: ./frontend
    depends_on:
      - api
    ports:
      - "8080:80"
    restart: unless-stopped

volumes:
  api-data:
